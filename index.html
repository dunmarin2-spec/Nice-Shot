<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나이스샷 가드 (Nice Shot Guard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,900&display=swap');
        
        /* 💡 전체 화면 꽉 채우기 설정 */
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0;
            background-color: #ffffff; 
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
        }

        /* 💡 폰 화면에 꽉 차는 카드 디자인 */
        .golf-card { 
            width: 100%; 
            max-width: 500px; /* PC에서 볼 때 너무 커지는 것 방지 */
            margin: 0 auto;
            background: #ffffff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            flex: 1; /* 높이 꽉 채우기 */
        }
        
        .card-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-style: italic; color: #1e293b; letter-spacing: -1px; line-height: 0.8; }
        
        /* 사진 영역 (화면 비율에 맞게 큼직하게) */
        .photo-box { 
            width: 100%; 
            flex: 1; /* 남는 공간 사진에 올인 */
            min-height: 300px;
            border-radius: 20px; 
            overflow: hidden; 
            background: #f8fafc; 
            border: 2px dashed #e2e8f0; 
            margin: 15px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
        }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .photo-btn { z-index: 2; background: #FAE100; color: #3C1E1E; padding: 14px 24px; border-radius: 15px; font-weight: 800; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        
        .input-text { color: #1e293b; font-weight: 700; outline: none; border: none; background: transparent; padding: 0;}
        .rendering .input-text { display: none !important; }
        .fixed-text { display: none; color: #1e293b; font-weight: 700; word-break: break-all; white-space: pre-wrap; text-transform: uppercase;}
        .rendering .fixed-text { display: block !important; }
        
        .score-font { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 64px; line-height: 1; color: #b59410; }
        .rendering .score-font { display: block !important; color: #b59410 !important; }

        /* 저장 버튼 하단 고정 */
        .bottom-btn { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; background: #ffffff; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>
    <div class="golf-card" id="captureArea">
        <div class="flex justify-between items-start pt-4 mb-2">
            <div class="flex flex-col">
                <span class="card-logo text-5xl">NICE</span>
                <span class="card-logo text-5xl">SHOT</span>
            </div>
            <div class="text-right flex flex-col items-end">
                <p id="cardDate" class="text-[10px] text-slate-400 font-bold mb-1"></p>
                <div class="relative">
                    <input type="text" id="size" placeholder="72" class="input-text score-font w-24 text-right">
                    <div id="size_fixed" class="fixed-text score-font w-24 text-right"></div>
                </div>
                <span class="text-[11px] text-[#b59410] font-black tracking-widest mt-[-5px]">TOTAL SCORE</span>
            </div>
        </div>
        
        <div class="photo-box" onclick="document.getElementById('fileInput').click()">
            <div id="uploadGuide" class="flex flex-col items-center gap-3">
                <div class="photo-btn flex items-center gap-2">
                    <i data-lucide="camera" class="w-6 h-6"></i>
                    사진/스코어카드 등록
                </div>
                <p class="text-xs text-slate-400 font-bold">인생샷을 골라주세요</p>
            </div>
            <img id="viewImg" class="hidden">
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
        </div>

        <div class="space-y-3 mb-4">
            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Golf Club / CC</p>
                <div class="relative">
                    <input type="text" id="fish" placeholder="골프장 이름 입력" class="input-text text-sm w-full text-black">
                    <div id="fish_fixed" class="fixed-text text-sm w-full text-black"></div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Course/Hole</p>
                    <div class="relative">
                        <input type="text" id="loc" placeholder="코스 명칭" class="input-text text-[12px] w-full text-black">
                        <div id="loc_fixed" class="fixed-text text-[12px] w-full text-black"></div>
                    </div>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">With</p>
                    <input type="text" placeholder="동반자 성함" class="input-text text-[12px] w-full text-black">
                </div>
            </div>

            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 min-h-[80px]">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Rounding Review</p>
                <div class="relative">
                    <textarea id="bait" placeholder="오늘 라운딩은 어떠셨나요?" class="input-text text-[12px] w-full h-12 resize-none leading-tight text-black"></textarea>
                    <div id="bait_fixed" class="fixed-text text-[12px] w-full h-12 resize-none leading-tight text-black"></div>
                </div>
            </div>
        </div>
        <p class="text-[8px] text-center text-slate-300 italic mb-2">Powered by Nice Shot Guard</p>
    </div>

    <div class="bottom-btn">
        <button onclick="saveAndExport()" class="w-full bg-slate-900 text-white font-black p-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition text-lg mb-4">
            <i data-lucide="download" class="w-6 h-6 text-[#FAE100]"></i> 갤러리에 초고화질 저장
        </button>
        
        <div class="flex gap-2">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-3 rounded-xl font-bold text-xs shadow active:scale-95 transition">
                커피 후원 ☕
            </a>
            <a href="https://www.coupang.com/np/search?channel=user_side_view&q=%EA%B3%A8%ED%94%84%EC%9A%A9%ED%92%88" target="_blank" class="flex-1 flex items-center justify-center gap-2 bg-slate-800 text-white py-3 rounded-xl font-bold text-xs shadow active:scale-95 transition">
                골프용품 검색 ⛳
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {year: 'numeric', month: 'long', day: 'numeric'});

        function loadFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1500;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    document.getElementById('viewImg').src = canvas.toDataURL('image/jpeg', 0.95);
                    document.getElementById('viewImg').classList.remove('hidden');
                    document.getElementById('uploadGuide').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveAndExport() {
            const fishCC = document.getElementById('fish');
            const scoreSize = document.getElementById('size');
            const locCourse = document.getElementById('loc');
            const baitReview = document.getElementById('bait');
            const imgEl = document.getElementById('viewImg');
            
            if(!fishCC.value || imgEl.classList.contains('hidden')) {
                return alert('골프장 이름과 사진은 필수입니다, 형님!');
            }

            const area = document.getElementById('captureArea');
            document.getElementById('fish_fixed').innerText = fishCC.value || ' ';
            document.getElementById('size_fixed').innerText = scoreSize.value || '72';
            document.getElementById('loc_fixed').innerText = locCourse.value || ' ';
            document.getElementById('bait_fixed').innerText = baitReview.value || ' ';
            
            area.classList.add('rendering');
            // 💡 캡처 시 카드 영역만 깔끔하게 따기 위해 width 지정
            const canvas = await html2canvas(area, { 
                scale: 2.5, 
                backgroundColor: '#ffffff',
                width: area.offsetWidth,
                height: area.offsetHeight
            });
            area.classList.remove('rendering');

            const cardImgData = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `NiceShot_${new Date().toISOString().slice(2,10)}_${fishCC.value}.png`;
            link.href = cardImgData;
            link.click();

            alert('인생샷이 갤러리에 저장되었습니다! ⛳️');

            [fishCC, scoreSize, locCourse, baitReview].forEach(i => i.value = '');
            imgEl.src = '';
            imgEl.classList.add('hidden');
            document.getElementById('uploadGuide').classList.remove('hidden');
        }
    </script>
</body>
</html>
