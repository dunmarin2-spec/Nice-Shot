<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나이스샷 가드 v5.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 💡 필기체 느낌을 위해 가독성 좋은 손글씨 폰트 하나 더 추가했습니다 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,900&family=Nanum+Pen+Script&display=swap');
        
        html, body { overflow-x: hidden; width: 100%; min-height: 100%; margin: 0; padding: 0; background-color: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .golf-card { width: 100%; max-width: 500px; margin: 0 auto; background: #ffffff; padding: 25px 20px; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-style: italic; color: #1e293b; letter-spacing: -1px; line-height: 0.8; }
        
        /* 💡 찬둥의 필기체 스타일 */
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 24px; color: #b59410; transform: rotate(-10deg); margin-bottom: -10px; margin-left: 5px; z-index: 50; }
        
        .score-input-wrapper { background: #fffbeb; border: 2px solid #b59410; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; width: 115px; height: 80px; padding: 0; }
        .score-font { font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 44px !important; color: #b59410; text-align: center; width: 100%; background: transparent; border: none; outline: none; line-height: 80px; }
        .score-font::placeholder { font-size: 14px !important; color: #d4af37; font-weight: 600; text-align: center; opacity: 0.7; }
        .photo-box { width: 100%; aspect-ratio: 4 / 5; border-radius: 20px; overflow: hidden; background: #f8fafc; border: 2px dashed #cbd5e1; margin: 15px 0; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 10; display: none; }
        .photo-btn { z-index: 20; background: #FAE100; color: #3C1E1E; padding: 14px 24px; border-radius: 12px; font-weight: 800; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-text { color: #1e293b; font-weight: 700; outline: none; border: none; background: transparent; padding: 0;}
        .rendering .input-text { display: none !important; }
        .fixed-text { display: none; color: #1e293b; font-weight: 700; word-break: break-all; white-space: pre-wrap; text-transform: uppercase;}
        .rendering .fixed-text { display: block !important; }
        .bottom-area { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; position: relative; z-index: 999; }
    </style>
</head>
<body>
    <div id="captureArea" class="golf-card">
        <div class="flex justify-between items-start pt-4 mb-4">
            <div class="flex flex-col relative">
                <span class="chan-doong-signature">찬둥의</span>
                <span class="card-logo text-5xl">NICE</span><span class="card-logo text-5xl">SHOT</span>
            </div>
            <div class="text-right flex flex-col items-end">
                <p id="cardDate" class="text-[10px] text-slate-400 font-bold mb-2"></p>
                <div class="score-input-wrapper">
                    <input type="number" id="size" placeholder="스코어" class="input-text score-font">
                    <div id="size_fixed" class="fixed-text score-font"></div>
                </div>
                <span class="text-[10px] text-[#b59410] font-black tracking-widest mt-2">TOTAL SCORE</span>
            </div>
        </div>
        
        <div class="photo-box" onclick="document.getElementById('fileInput').click()">
            <div id="uploadGuide" class="flex flex-col items-center gap-3">
                <div class="photo-btn flex items-center gap-2"><i data-lucide="camera" class="w-6 h-6"></i>📸 라운딩 사진 등록</div>
            </div>
            <img id="viewImg" src="">
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewImage(this)">
        </div>

        <div class="space-y-4 mb-6">
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Golf Club / CC</p>
                <input type="text" id="fish" placeholder="골프장 이름 입력" class="input-text text-sm w-full text-black">
                <div id="fish_fixed" class="fixed-text text-sm w-full text-black"></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Course</p>
                    <input type="text" id="loc" placeholder="코스 명칭" class="input-text text-[12px] w-full text-black">
                    <div id="loc_fixed" class="fixed-text text-[12px] w-full text-black"></div>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">With</p>
                    <input type="text" placeholder="동반자 성함" class="input-text text-[12px] w-full text-black">
                </div>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 min-h-[70px]">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Rounding Review</p>
                <textarea id="bait" placeholder="오늘 라운딩은 어떠셨나요?" class="input-text text-[12px] w-full h-12 resize-none text-black"></textarea>
                <div id="bait_fixed" class="fixed-text text-[12px] w-full h-12 text-black"></div>
            </div>
        </div>
        <p class="text-[8px] text-center text-slate-300 italic">Powered by Nice Shot Guard</p>
    </div>

    <div class="bottom-area">
        <button onclick="saveAndExport()" class="w-full bg-slate-900 text-white font-black p-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition text-lg mb-6">
            <i data-lucide="download" class="w-6 h-6 text-[#FAE100]"></i> 갤러리에 초고화질 저장
        </button>
        <div class="flex flex-col gap-3">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-xl font-bold text-sm shadow">☕ 찬둥에게 커피 후원하기</a>
            
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="골프용품 최저가 검색" class="flex-grow p-2.5 border rounded-lg text-sm bg-slate-50 outline-none text-black">
                    <button type="submit" class="bg-slate-800 text-white px-4 rounded-lg font-bold text-xs cursor-pointer">검색</button>
                </form>
                <p class="text-[10px] text-slate-400 mt-2 text-center">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'});

        let currentUrl = null;
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const img = document.getElementById('viewImg');
                const guide = document.getElementById('uploadGuide');
                if (currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(input.files[0]);
                img.src = currentUrl;
                img.style.display = 'block';
                guide.style.display = 'none';
                input.value = "";
            }
        }

        async function saveAndExport() {
            const fishCC = document.getElementById('fish');
            const scoreSize = document.getElementById('size');
            const imgEl = document.getElementById('viewImg');
            if(!fishCC.value || !scoreSize.value || imgEl.style.display === 'none') {
                return alert('골프장 이름, 스코어, 사진은 필수입니다!');
            }
            const area = document.getElementById('captureArea');
            document.getElementById('fish_fixed').innerText = fishCC.value;
            document.getElementById('size_fixed').innerText = scoreSize.value;
            document.getElementById('loc_fixed').innerText = document.getElementById('loc').value || ' ';
            document.getElementById('bait_fixed').innerText = document.getElementById('bait').value || ' ';
            area.classList.add('rendering');
            window.scrollTo(0, 0);
            const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
            area.classList.remove('rendering');
            const link = document.createElement('a');
            link.download = `NiceShot_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            alert('인생샷이 갤러리에 저장되었습니다! ⛳️');
        }
    </script>
</body>
</html>
